name: CI - Validação do Monorepo

# 1. Quando este robô deve ser ativado?
on:
  pull_request:
    branches: [ "develop", "main" ]

# 2. O que ele deve fazer?
jobs:
  testagem-automatica:
    name: 🧪 Instalar, Configurar BD e Testar
    runs-on: ubuntu-latest

    # 3. Subindo o Banco de Dados para os testes (Conforme docker-compose / ambiente local)
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: la_resenha_fc_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: 📥 Clonar o repositório
        uses: actions/checkout@v4

      - name: ⚙️ Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # Como agora temos o Monorepo configurado, basta um comando na raiz!
      - name: 📦 Instalar dependências (NPM Workspaces)
        run: npm ci

      # O Prisma precisa gerar o cliente e criar as tabelas no banco de testes
      - name: 🗄️ Preparar Banco de Dados (Prisma)
        env:
          DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/la_resenha_fc_test?schema=public"
        run: |
          npx prisma generate --schema=apps/api/prisma/schema.prisma
          npx prisma db push --schema=apps/api/prisma/schema.prisma

      # O comando de teste usa a flag -w para testar a API diretamente pela raiz
      - name: 🔍 Rodar Testes (Backend)
        env:
          DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/la_resenha_fc_test?schema=public"
        run: npm run test -w apps/api
